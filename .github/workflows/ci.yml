# =============================================================================
# Customer Segmentation Dashboard — CI/CD Pipeline
# =============================================================================
# Runs on every push to main and on all pull requests.
#
# Jobs (run in parallel):
#   lint      — Python syntax & import validation
#   pipeline  — End-to-end smoke test (load data, train ML models)
#   deploy    — Trigger Streamlit Community Cloud redeploy (deploy hook)
# =============================================================================

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.12"

jobs:
  # ── Lint: Python syntax checks & import validation ──────────────────────
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run lint checks
        run: python ci/lint_check.py

  # ── Pipeline smoke test: load data, RFM, train ML models ──────────────
  pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"
          cache-dependency-path: requirements.txt

      # Cache the downloaded UCI dataset so CI doesn't re-download on every run
      - name: Cache dataset
        uses: actions/cache@v4
        with:
          path: data/online_retail_II.parquet
          key: uci-online-retail-v1
          restore-keys: |
            uci-online-retail-

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pipeline smoke test
        run: python ci/pipeline_smoke_test.py
        timeout-minutes: 15

  # ── Deploy: trigger Streamlit Cloud redeploy via deploy hook ──────────
  # Streamlit Cloud auto-deploys from the connected branch on every push,
  # so this job is optional. Set the STREAMLIT_DEPLOY_HOOK secret for manual
  # redeploy triggers (e.g., from a workflow_dispatch or after CI passes).
  deploy:
    if: github.ref == 'refs/heads/main' && success()
    runs-on: ubuntu-latest
    needs: [lint, pipeline]

    steps:
      - name: Trigger Streamlit Cloud redeploy
        if: ${{ secrets.STREAMLIT_DEPLOY_HOOK != '' }}
        run: |
          echo "Triggering Streamlit Cloud redeploy..."
          curl -s -X POST "${{ secrets.STREAMLIT_DEPLOY_HOOK }}" \
            -H "Accept: application/json" \
            --connect-timeout 10 --max-time 60
          echo ""
          echo "Redeploy triggered successfully."

      - name: No deploy hook configured
        if: ${{ secrets.STREAMLIT_DEPLOY_HOOK == '' }}
        run: |
          echo "No STREAMLIT_DEPLOY_HOOK secret configured."
          echo "Streamlit Cloud auto-deploys from the connected branch on every push."
          echo ""
          echo "To add a deploy hook for manual triggering:"
          echo "  1. Go to share.streamlit.io -> your app -> Settings -> Deploy Hooks"
          echo "  2. Create a deploy hook URL"
          echo "  3. Add it as a GitHub secret named STREAMLIT_DEPLOY_HOOK"
